<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 430" role="img" aria-labelledby="title desc">
  <title id="title">Expected TDM8 smoke-demo waveform on mikroBUS-A</title>
  <desc id="desc">Frame sync, bit clock, and SPI1 data output for an eight-slot TDM frame.</desc>
  <rect width="1100" height="430" fill="#f7f8fa"/>
  <text x="48" y="46" font-family="Arial, Helvetica, sans-serif" font-size="26" fill="#141820">TDM8 smoke demo on mikroBUS-A</text>
  <text x="48" y="75" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#4e5a66">Expected reference waveform: FS ~48.8 kHz, BCLK ~12.5 MHz, SPI1 DataOut test pattern, 8 slots per frame.</text>

